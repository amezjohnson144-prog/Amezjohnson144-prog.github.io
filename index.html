<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background-color: #f8f6f3;
    color: #333;
}

.hero {
    position: relative;
    height: 100vh;
    background: url('profile.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

.hero-content {
    position: relative;
    color: white;
    z-index: 1;
}

.hero h1 {
    .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    letter-spacing: 8px;
    font-weight: 500;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.hero p {
    font-size: 20px;
    opacity: 0.9;
}

.button {
    .hero button {
    font-family: 'Montserrat', sans-serif;
    background: black;
    color: white;
    padding: 14px 40px;
    border: none;
    letter-spacing: 2px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s ease;
}

.hero button:hover {
    background: #333;
}

section {
    padding: 80px 20px;
    text-align: center;
    max-width: 900px;
    margin: auto;
}

h2 {
    font-size: 32px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>Wildwood Lights</h1>
        <p>Creative • Driven • Inspired</p>
        <a href="#" class="button">Explore</a>
    </div>
</div>

<section>
    <h2>About Me</h2>
    <p>I’m building my journey, exploring creativity, and designing my own path.</p>
</section>

<section>
    <h2>Projects</h2>
    <p>More coming soon...</p>
</section>

</body>
</html>
