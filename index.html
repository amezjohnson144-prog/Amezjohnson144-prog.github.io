<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildwood Lights</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background-color: #f8f6f3;
    color: #333;
}

.hero {
    position: relative;
    height: 100vh;
    background: url('profile.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

.hero-content {
    position: relative;
    color: white;
    z-index: 1;
}

.hero h1 {
    .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 20px;
    opacity: 0.9;
}

.button {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 30px;
    border-radius: 30px;
    background: white;
    color: black;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.button:hover {
    background: #ddd;
}

section {
    padding: 80px 20px;
    text-align: center;
    max-width: 900px;
    margin: auto;
}

h2 {
    font-size: 32px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>Wildwood Lights</h1>
        <p>Creative • Driven • Inspired</p>
        <a href="#" class="button">Explore</a>
    </div>
</div>

<section>
    <h2>About Me</h2>
    <p>I’m building my journey, exploring creativity, and designing my own path.</p>
</section>

<section>
    <h2>Projects</h2>
    <p>More coming soon...</p>
</section>

</body>
</html>
